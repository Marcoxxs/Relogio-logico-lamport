<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet" href=st">

<head>
  <meta charset="UTF-8">
  <title>Sistemas Distribuídos - Sincronização</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      margin: 0;
      padding: 20px;
      color: #e2e8f0;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 600;
      color: #38bdf8;
    }

    .box {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 20px;
      margin: 20px auto;
      width: 420px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
    }

    h2 {
      color: #7dd3fc;
      margin-bottom: 15px;
    }

    input {
      width: 80%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
      outline: none;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      transition: 0.2s;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 8px #38bdf855;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #38bdf8aa;
    }

    hr {
      border: none;
      height: 1px;
      background: #334155;
      margin: 20px 0;
    }

    #resultado {
      background: #020617;
      border: 1px solid #334155;
      color: #22c55e;
      padding: 20px;
      margin: 30px auto;
      width: 420px;
      border-radius: 12px;
      white-space: pre-line;
      text-align: left;
      font-family: monospace;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>

<body>

  <h1>Simulação - Sistemas Distribuídos</h1>

  <div class="box">
    <h2>Servidor</h2>
    Hora Local: <span id="horaServidor"></span><br><br>
    <button onclick="sincronizar()">Sincronizar</button>
  </div>

  <div class="box">
    <h2>Clientes</h2>

    <div>
      Cliente 1<br>
      Hora Local: <input id="c1Hora"><br>
      Clock Lógico: <input id="c1Clock" type="number"><br>
      <button onclick="enviar(1)">Enviar</button>
    </div>

    <hr>

    <div>
      Cliente 2<br>
      Hora Local: <input id="c2Hora"><br>
      Clock Lógico: <input id="c2Clock" type="number"><br>
      <button onclick="enviar(2)">Enviar</button>
    </div>

    <hr>

    <div>
      Cliente 3<br>
      Hora Local: <input id="c3Hora"><br>
      Clock Lógico: <input id="c3Clock" type="number"><br>
      <button onclick="enviar(3)">Enviar</button>
    </div>
  </div>

  <div id="resultado"></div>

  <script>
    let eventos = [];
    let clockServidor = 0;

    function atualizarHoraServidor() {
      let agora = new Date();
      document.getElementById("horaServidor").innerText =
        agora.toLocaleTimeString();
    }

    setInterval(atualizarHoraServidor, 1000);

    function enviar(cliente) {
      let hora = document.getElementById(`c${cliente}Hora`).value;
      let clock = parseInt(document.getElementById(`c${cliente}Clock`).value);

      if (!hora || isNaN(clock)) {
        alert("Preencha todos os campos!");
        return;
      }

      clockServidor = Math.max(clockServidor, clock) + 1;

      eventos.push({
        cliente: cliente,
        hora: hora,
        clock: clockServidor
      });

      alert(`Mensagem do Cliente ${cliente} recebida!`);
    }

    function sincronizar() {
      if (eventos.length === 0) {
        alert("Nenhum evento ainda!");
        return;
      }

      let soma = clockServidor;
      eventos.forEach(e => soma += e.clock);

      let media = Math.floor(soma / (eventos.length + 1));

      let resultado = `Clock Servidor: ${clockServidor}\n`;
      resultado += `Clock Médio: ${media}\n\n`;

      resultado += "Ajustes:\n";
      resultado += `Servidor: ${media - clockServidor}\n`;

      eventos.forEach(e => {
        resultado += `Cliente ${e.cliente}: ${media - e.clock}\n`;
      });

      eventos.sort((a, b) => {
        if (a.clock === b.clock) {
          return a.cliente - b.cliente;
        }
        return a.clock - b.clock;
      });

      resultado += "\nOrdem de envio:\n";
      eventos.forEach((e, i) => {
        resultado += `${i + 1}º -> Cliente ${e.cliente} (Clock: ${e.clock})\n`;
      });

      document.getElementById("resultado").innerText = resultado;
    }
  </script>

</body>

</html>
